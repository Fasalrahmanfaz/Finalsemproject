{% extends 'base.html' %}
{% block title %}Edit Band Profile{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card bg-white shadow-sm border-0 p-4">
                <h4 style="color: var(--bs-body-color);font-weight:700" class="mb-4">Edit Band Profile</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary fw-bold flex-grow-1">Save Changes</button>
                        <a href="{% url 'bands:manager_dashboard' %}" class="btn btn-outline-primary fw-bold">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
