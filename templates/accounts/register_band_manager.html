{% extends 'base.html' %}
{% block title %}Register Band Manager{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-white shadow-sm border-0 p-4">
                <h4 style="color: var(--bs-body-color);" class="mb-4 text-center">Register as Band Manager</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary fw-bold mt-3 w-100">Sign Up</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
