{% extends 'base.html' %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-white shadow-sm border-0 p-4">
                <h4 style="color: var(--bs-body-color);" class="mb-4 text-center">Verify Email (OTP)</h4>
                <p style="color: #94a3b8;" class="text-center mb-4">An OTP has been sent to {{
                    request.session.reset_email|default:"your email" }}. Please enter it below.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary fw-bold mt-3 w-100">Verify OTP</button>
                </form>
                <div class="mt-4 text-center">
                    <p style="color: #94a3b8;font-size:0.9rem">
                        Didn't receive code? <a href="#">Resend OTP</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
