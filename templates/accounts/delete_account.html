{% extends 'base.html' %}
{% block title %}Delete Account{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-white shadow-sm border-0 p-5 text-center">
                <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
                <h4 style="color: var(--bs-body-color);font-weight:700" class="mb-3">Delete Your Account</h4>
                <p style="color: #94a3b8;" class="mb-4">
                    This action is <strong>permanent</strong> and cannot be undone. All your data including
                    bookings, reviews, and profile information will be permanently removed.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger fw-bold w-100 mb-3"
                        onclick="return confirm('Are you absolutely sure? This cannot be undone.')">
                        <i class="bi bi-trash me-2"></i>Yes, Delete My Account
                    </button>
                </form>
                <a href="javascript:history.back()" class="btn btn-outline-primary fw-bold w-100">
                    <i class="bi bi-arrow-left me-2"></i>Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
