{% extends 'base.html' %}
{% block title %}Booking Submitted{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="card bg-white shadow-sm border-0 p-5" style="max-width:600px;margin:0 auto">
        <div style="font-size:4rem;color:#10B981" class="mb-3"><i class="bi bi-check-circle-fill"></i></div>
        <h3 style="color: var(--bs-body-color);" class="mb-3">Booking Submitted!</h3>
        <p style="color: #94a3b8;" class="mb-4">Your booking request has been successfully sent to the band manager.
            They will get back to you soon.</p>
        <a href="{% url 'enquiries:my_enquiries' %}" class="btn btn-primary fw-bold me-2">View My Bookings</a>
        <a href="{% url 'bands:explore' %}" class="btn btn-outline-primary fw-bold">Explore More Bands</a>
    </div>
</div>
{% endblock %}
