{% extends 'base.html' %}
{% block title %}Rate {{ booking.band.band_name }}{% endblock %}
{% block content %}
<style>
    .star-picker { display:flex; gap:8px; justify-content:center; margin:1.5rem 0; }
    .star-picker .star { font-size:2.5rem; cursor:pointer; color:rgba(255,255,255,0.15); transition:all 0.15s; user-select:none; }
    .star-picker .star:hover, .star-picker .star.active { color:#F59E0B; transform:scale(1.15); }
    .star-picker .star:hover ~ .star { color:rgba(255,255,255,0.15) !important; }
    .star-label { text-align:center; font-size:0.85rem; color:#a78bfa; font-weight:600; min-height:22px; }
</style>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-white shadow-sm border-0 p-5" style="border-radius:1.2rem">
                <div class="text-center mb-4">
                    <div style="font-size:3rem;margin-bottom:0.5rem">⭐</div>
                    <h4 style="color: var(--bs-body-color);font-weight:700">Rate {{ booking.band.band_name }}</h4>
                    <p style="color:#94a3b8;font-size:0.85rem">
                        Event: {{ booking.event_type }} on {{ booking.event_date|date:"d M Y" }}
                    </p>
                </div>
                <form method="post" id="rateForm">
                    {% csrf_token %}
                    <input type="hidden" name="stars" id="starsInput" value="0">

                    <label style="color:var(--bs-body-color);font-weight:600;font-size:0.9rem" class="mb-2">Your Rating</label>
                    <div class="star-picker" id="starPicker">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <div class="star-label" id="starLabel">Click a star to rate</div>

                    <div class="mb-4 mt-4">
                        <label for="review" style="color:var(--bs-body-color);font-weight:600;font-size:0.9rem" class="mb-2">Your Review (optional)</label>
                        <textarea name="review" id="review" class="form-control" rows="4" placeholder="Tell others about your experience..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary fw-bold w-100 py-3" style="border-radius:10px;font-size:1rem" id="submitBtn" disabled>
                        <i class="bi bi-star-fill me-1"></i>Submit Review
                    </button>
                    <a href="{% url 'bookings:my_bookings' %}" class="btn btn-outline-primary fw-bold w-100 mt-2 py-2" style="border-radius:10px">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    var labels = { 1: 'Poor', 2: 'Fair', 3: 'Good', 4: 'Very Good', 5: 'Excellent!' };
    var selectedStars = 0;
    var stars = document.querySelectorAll('.star-picker .star');

    stars.forEach(function(star) {
        star.addEventListener('click', function() {
            selectedStars = parseInt(this.getAttribute('data-value'));
            document.getElementById('starsInput').value = selectedStars;
            document.getElementById('starLabel').textContent = selectedStars + '/5 — ' + labels[selectedStars];
            document.getElementById('submitBtn').disabled = false;
            updateStars();
        });
        star.addEventListener('mouseenter', function() {
            var val = parseInt(this.getAttribute('data-value'));
            stars.forEach(function(s) {
                s.style.color = parseInt(s.getAttribute('data-value')) <= val ? '#F59E0B' : 'rgba(255,255,255,0.15)';
            });
        });
    });

    document.getElementById('starPicker').addEventListener('mouseleave', function() {
        updateStars();
    });

    function updateStars() {
        stars.forEach(function(s) {
            s.className = parseInt(s.getAttribute('data-value')) <= selectedStars ? 'star active' : 'star';
            s.style.color = '';
        });
    }

    document.getElementById('rateForm').addEventListener('submit', function(e) {
        if (selectedStars < 1) {
            e.preventDefault();
            document.getElementById('starLabel').textContent = 'Please select a rating!';
            document.getElementById('starLabel').style.color = '#ef4444';
        }
    });
</script>
{% endblock %}
