{% extends 'base.html' %}
{% block title %}Payment Successful{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="card p-5 shadow border-success border-2">
            <h1 class="display-1 text-success mb-4"><i class="bi bi-check-circle-fill"></i></h1>
            <h2 class="mb-3">Payment Successful!</h2>

            <a href="{% url 'bookings:my_bookings' %}" class="btn btn-primary btn-lg">Go to My Bookings</a>
        </div>
    </div>
</div>
{% endblock %}
